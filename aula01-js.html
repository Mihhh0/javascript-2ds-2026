</head>
<body>

    <input type="text" id="teste">
    <button onclick="enviar">Enviar</button>
    
</body>

<script>
    let nome = "Micheli";
    let idade = 16;
    let altura = 1.5;
    let estudando = true;

    document.write("<h1>"+nome+"</h1>");
    document.write("<br>");
    document.write("<h2>"+idade+"</h2>");
    document.write("<br>");
    document.write("<h2>"+altura+"</h2>");
    document.write("<br>");
    document.write("<h2>"+estudando+"</h2>");

    let teste = document.getElementById("teste");

    function enviar(){
        document.write(teste);
    }

</script>
