<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA01 - JAVASCRIPT</title>
</head>
<body>

    <input type="text" id="teste">
    <button onclick="enviar">Enviar</button>
    <div id="resultado"></div>
    
</body>

<script>
    let nome = "Micheli";
    let idade = 16;
    let altura = 1.5;
    let estudando = true;

    document.write("<h1>"+nome+"</h1>");
    document.write("<br>");
    document.write("<h2>"+idade+"</h2>");
    document.write("<br>");
    document.write("<h2>"+altura+"</h2>");
    document.write("<br>");
    document.write("<h2>"+estudando+"</h2>");

    let teste = document.getElementById("teste");
    let areaTexto = document.getElementById("resultado");

    function enviar(){
        let mensagem = teste.value;
        //PEGAMOS O .value PARA VER O TEXTO
        alert("Você digitou: "+ mensagem);
        areaTexto.innerHTML = "<h3>Você digitou: " + mensagem + "</h3>"
    }

</script>






</html>
